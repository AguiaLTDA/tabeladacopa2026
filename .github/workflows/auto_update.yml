name: Auto-update Copa 2026 Results

on:
  schedule:
    - cron: '0 0,2,4,7,9,12,14,16,19,21 * * *'   # Runs 10 times a day (spaced every 2-3 hours)
  workflow_dispatch:        # Allows manual trigger in Actions UI

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository 🛎
        uses: actions/checkout@v4

      - name: Set up Python 🔧
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script 🚀
        run: |
          python update_results.py

      - name: Commit and Push Changes 💾
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          # Check if there are changes to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update match results from Wikipedia [skip ci]" && git push)
